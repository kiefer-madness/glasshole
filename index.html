<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>glasshole</title>
<style>
  :root {
    --ink: #26221c;          /* lead lines */
    --paper: #f6f1e6;        /* pattern cartoon paper */
    --paper-line: #e7dfcd;
    --bench: #2e2a25;        /* workbench chrome */
    --bench-hi: #3a352e;
    --bench-edge: #4a443b;
    --text: #e8e2d6;
    --text-dim: #a89f8e;
    --amber: #c9781f;        /* selection / active */
    --amber-soft: rgba(201,120,31,.18);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: "Avenir Next", "Segoe UI", system-ui, sans-serif;
    background: var(--bench);
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  header {
    display: flex;
    align-items: baseline;
    gap: 14px;
    padding: 12px 18px 10px;
    border-bottom: 1px solid var(--bench-edge);
  }
  header h1 {
    font-family: Georgia, "Times New Roman", serif;
    font-weight: 600;
    font-size: 19px;
    letter-spacing: .06em;
    color: var(--text);
  }
  header h1 .amp { color: var(--amber); }
  header .hint {
    font-size: 12.5px;
    color: var(--text-dim);
    letter-spacing: .02em;
  }

  main { display: flex; flex: 1; min-height: 0; }

  /* ---------- toolbar ---------- */
  #toolbar {
    width: 172px;
    padding: 12px 10px;
    background: var(--bench);
    border-right: 1px solid var(--bench-edge);
    display: flex;
    flex-direction: column;
    gap: 6px;
    overflow-y: auto;
  }
  .tool {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 9px;
    border: 1px solid transparent;
    border-radius: 6px;
    background: none;
    color: var(--text);
    font: inherit;
    font-size: 13.5px;
    cursor: pointer;
    text-align: left;
  }
  .tool:hover { background: var(--bench-hi); }
  .tool.active {
    background: var(--amber-soft);
    border-color: var(--amber);
    color: #f4d8ad;
  }
  .tool svg { flex: 0 0 26px; }
  .tool .chev {
    flex: 0 0 26px;
    text-align: center;
    font-size: 13px;
    color: var(--text-dim);
  }
  #shapes-group { padding-left: 10px; }
  #shapes-group .tool { width: calc(100% - 0px); }

  .rule {
    border: none;
    border-top: 1px solid var(--bench-edge);
    margin: 6px 2px;
  }
  .panel-label {
    font-size: 11px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--text-dim);
    padding: 4px 4px 2px;
  }
  .slider-wrap { padding: 2px 6px 6px; }
  .slider-wrap output {
    font-size: 12px; color: var(--text-dim); margin-left: 6px;
  }
  input[type="range"] {
    width: 100%;
    accent-color: var(--amber);
  }
  .tool.danger:hover { background: rgba(170,60,45,.22); }

  /* ---------- canvas ---------- */
  #stage-outer {
    position: relative;          /* pins the badges over the scroll area */
    flex: 1;
    min-width: 0;
    display: flex;
  }
  #stage-wrap { flex: 1; padding: 14px; min-width: 0; overflow: auto; }
  #zoom-sizer {
    position: relative;          /* reserves the scaled footprint */
  }
  #board {
    position: absolute;
    top: 0;
    left: 0;
    transform-origin: 0 0;       /* scaled by the zoom transform */
    background:
      linear-gradient(var(--paper-line) 1px, transparent 1px) 0 0 / 100% 28px,
      linear-gradient(90deg, var(--paper-line) 1px, transparent 1px) 0 0 / 28px 100%,
      var(--paper);
    border-radius: 4px;
    box-shadow: inset 0 0 0 1px #cfc5ad, 0 3px 14px rgba(0,0,0,.45);
  }
  #paint {
    position: absolute;
    inset: 0;
    pointer-events: none;       /* clicks fall through to the SVG on top */
    mix-blend-mode: multiply;   /* paint tints the paper like glass */
    border-radius: 4px;
  }
  #stage {
    position: relative;         /* stacks above the paint layer */
    touch-action: none;
    display: block;
  }
  #coord {
    position: absolute;
    top: 22px;
    right: 22px;
    padding: 3px 8px;
    background: rgba(38, 34, 28, .82);
    color: #e8e2d6;
    font: 600 11.5px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;
    border-radius: 4px;
    pointer-events: none;
    display: none;
    z-index: 5;
  }
  #zoom-badge {
    position: absolute;
    bottom: 22px;
    right: 22px;
    padding: 3px 8px;
    background: rgba(38, 34, 28, .82);
    color: #e8e2d6;
    font: 600 11.5px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;
    border-radius: 4px;
    border: none;
    cursor: pointer;
    z-index: 5;
  }
  #zoom-badge:hover { color: #f4d8ad; }
  #stage .piece { cursor: grab; }
  #stage .piece:active { cursor: grabbing; }
  #stage .hitline { stroke: transparent; fill: none; cursor: grab; }
  .handle { cursor: move; }

  footer {
    padding: 7px 18px;
    font-size: 12.5px;
    color: var(--text-dim);
    border-top: 1px solid var(--bench-edge);
    min-height: 30px;
  }

  /* ---------- modal (export / save / load fallbacks) ---------- */
  #modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.55);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 50;
  }
  #modal[hidden] { display: none; }
  #modal-box {
    background: var(--bench);
    border: 1px solid var(--bench-edge);
    border-radius: 8px;
    padding: 16px;
    width: min(560px, 92vw);
    max-height: 86vh;
    overflow: auto;
    box-shadow: 0 10px 40px rgba(0,0,0,.5);
  }
  #modal-body p {
    font-size: 13px;
    color: var(--text-dim);
    margin: 6px 0;
    line-height: 1.45;
  }
  #modal-body img {
    max-width: 100%;
    border-radius: 4px;
    display: block;
    margin: 8px 0;
    background: var(--paper);
  }
  #modal-body textarea {
    width: 100%;
    height: 160px;
    background: var(--bench-hi);
    color: var(--text);
    border: 1px solid var(--bench-edge);
    border-radius: 4px;
    font: 12px/1.4 ui-monospace, monospace;
    padding: 8px;
    resize: vertical;
  }
  #modal-actions {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    justify-content: flex-end;
    flex-wrap: wrap;
  }
  #modal-actions button {
    background: var(--bench-hi);
    border: 1px solid var(--bench-edge);
    border-radius: 5px;
    color: var(--text);
    font: inherit;
    font-size: 13px;
    padding: 6px 12px;
    cursor: pointer;
  }
  #modal-actions button:hover { border-color: var(--amber); }
  #modal-actions button.primary {
    background: var(--amber-soft);
    border-color: var(--amber);
    color: #f4d8ad;
  }

  /* ---------- right-click menu ---------- */
  #ctx {
    position: fixed;
    z-index: 100;
    background: var(--bench);
    border: 1px solid var(--bench-edge);
    border-radius: 6px;
    padding: 4px;
    box-shadow: 0 6px 24px rgba(0,0,0,.5);
    display: none;
    min-width: 200px;
  }
  #ctx button {
    display: block;
    width: 100%;
    text-align: left;
    background: none;
    border: none;
    color: var(--text);
    font: inherit;
    font-size: 13px;
    padding: 7px 10px;
    border-radius: 4px;
    cursor: pointer;
  }
  #ctx button:hover:not(:disabled) {
    background: var(--amber-soft);
    color: #f4d8ad;
  }
  #ctx button:disabled { opacity: .45; cursor: default; }

  /* ---------- toolbar button rows (undo/redo, copy/paste) ---------- */
  .btnrow {
    display: flex;
    gap: 6px;
    padding-bottom: 2px;
  }
  .btnrow .tool {
    flex: 1;
    justify-content: center;
    gap: 6px;
    border: 1px solid var(--bench-edge);
  }
  .btnrow .tool:disabled {
    opacity: .35;
    cursor: default;
    background: none;
  }

  /* ---------- canvas size inputs ---------- */
  #canvas-size {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 2px 6px 6px;
    font-size: 12.5px;
    color: var(--text-dim);
  }
  #canvas-size input {
    width: 56px;
    padding: 4px 5px;
    background: var(--bench-hi);
    border: 1px solid var(--bench-edge);
    border-radius: 4px;
    color: var(--text);
    font: inherit;
    font-size: 12.5px;
  }
  #canvas-size input:focus {
    outline: none;
    border-color: var(--amber);
  }

  /* ---------- paint controls ---------- */
  #paint-row { padding: 2px 6px 8px; }
  #paint-color {
    width: 100%;
    height: 30px;
    padding: 2px;
    background: var(--bench-hi);
    border: 1px solid var(--bench-edge);
    border-radius: 4px;
    cursor: pointer;
  }

  /* ---------- history panel ---------- */
  #history {
    width: 176px;
    border-left: 1px solid var(--bench-edge);
    padding: 12px 10px;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  #history-list {
    list-style: none;
    overflow-y: auto;
    margin-top: 4px;
    flex: 1;
  }
  #history-list li {
    font-size: 12.5px;
    padding: 5px 8px;
    border-radius: 5px;
    color: var(--text-dim);
    cursor: pointer;
    display: flex;
    align-items: baseline;
    gap: 7px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #history-list li:hover { background: var(--bench-hi); }
  #history-list li.current {
    background: var(--amber-soft);
    color: #f4d8ad;
  }
  #history-list li.future { opacity: .42; }
  #history-list li .n {
    font-size: 10.5px;
    color: var(--text-dim);
    min-width: 22px;
    text-align: right;
  }

  /* ---------- layers panel ---------- */
  .panel-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  #btn-add-layer {
    background: var(--bench-hi);
    border: 1px solid var(--bench-edge);
    border-radius: 4px;
    color: var(--text);
    font-size: 14px;
    line-height: 1;
    width: 22px;
    height: 22px;
    cursor: pointer;
  }
  #btn-add-layer:hover { border-color: var(--amber); }
  #layers-list {
    list-style: none;
    max-height: 190px;
    overflow-y: auto;
    margin: 4px 0 6px;
  }
  #layers-list li {
    display: flex;
    align-items: center;
    gap: 3px;
    font-size: 12.5px;
    color: var(--text-dim);
    padding: 4px 5px;
    border-radius: 5px;
    cursor: pointer;
  }
  #layers-list li:hover { background: var(--bench-hi); }
  #layers-list li.current {
    background: var(--amber-soft);
    color: #f4d8ad;
  }
  #layers-list li button {
    background: none;
    border: none;
    color: inherit;
    cursor: pointer;
    font-size: 12px;
    padding: 1px 3px;
    border-radius: 3px;
  }
  #layers-list li button:hover { background: rgba(255,255,255,.1); }
  #layers-list .lname {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  #layers-list .lop {
    font-size: 10.5px;
    color: var(--text-dim);
  }
  #btn-move-layer {
    width: 100%;
    justify-content: center;
    font-size: 12.5px;
    border: 1px solid var(--bench-edge);
    margin-bottom: 4px;
  }

  /* ---------- transform handles ---------- */
  .rot-handle { cursor: grab; }
  .rot-handle:active { cursor: grabbing; }
  .lock-btn {
    cursor: pointer;
    opacity: 0;                 /* revealed only while hovering the piece */
    pointer-events: none;       /* invisible chips must not eat clicks */
    transition: opacity .12s;
  }
  .lock-btn.show {
    opacity: var(--lk, 1);
    pointer-events: auto;
  }
  #stage .piece.locked { cursor: default; }
  #stage .piece.inactive { cursor: default; }
</style>
</head>
<body>

<header>
  <h1>nice going, glasshole</h1>
</header>

<main>
  <nav id="toolbar"></nav>
  <div id="stage-outer">
    <div id="stage-wrap">
      <div id="zoom-sizer">
        <div id="board">
          <canvas id="paint"></canvas>
          <svg id="stage" xmlns="http://www.w3.org/2000/svg"></svg>
        </div>
      </div>
    </div>
    <div id="coord"></div>
    <button id="zoom-badge" title="Scroll to zoom · click to reset to 100%">100%</button>
  </div>
  <aside id="history">
    <div class="panel-row">
      <div class="panel-label">Layers</div>
      <button id="btn-add-layer" title="Add a layer on top">+</button>
    </div>
    <ul id="layers-list"></ul>
    <div class="panel-label">Layer opacity</div>
    <div class="slider-wrap">
      <input type="range" id="layer-opacity" min="5" max="100" value="100">
      <output id="layer-opacity-out">100%</output>
    </div>
    <button class="tool" id="btn-move-layer"
      title="Send the selected pieces to the highlighted layer">
      <span>Send piece to layer</span>
    </button>
    <hr class="rule">
    <div class="panel-label">History</div>
    <ul id="history-list"></ul>
  </aside>
</main>

<footer id="status"></footer>

<div id="ctx"></div>

<div id="modal" hidden>
  <div id="modal-box">
    <div class="panel-label" id="modal-title"></div>
    <div id="modal-body"></div>
    <div id="modal-actions"></div>
  </div>
</div>

<script>
"use strict";

/* ============================== constants ============================== */

const LEAD = "#26221c";
const AMBER = "#c9781f";
const GUIDE = "rgba(70, 120, 210, .65)";   // guideline blue, translucent
const GUIDE_WIDTH = 1.5;
const GUIDE_DASH = "6 5";
const HANDLE_R = 5.5;
const HIT_DIST = 8;        // how close a click must be to a line to count
const DEFAULT_RADIUS = 70;
const GLASS = [
  "rgba(126,180,220,.55)", "rgba(228,178,96,.55)", "rgba(148,190,120,.55)",
  "rgba(190,140,185,.55)", "rgba(220,130,115,.55)", "rgba(230,205,110,.55)",
  "rgba(140,150,205,.55)", "rgba(120,195,170,.55)",
];

/* ============================== state ================================== */

let pieces = [];          // { id, kind, points:[[x,y]..], fill }
let nextId = 1;
let selection = [];        // multi-selection: array of piece objects
function soleSelected() { return selection.length === 1 ? selection[0] : null; }
function isSelected(p) { return selection.includes(p); }
function unlockedSelection() { return selection.filter(p => !p.locked); }
let tool = "select";
let thickness = 4;
let paletteIdx = 0;

// drag: null | {mode:'body', startPointer, members, moved}
//            | {mode:'vertex', index, moved} | {mode:'new', piece}
//            | {mode:'scale', anchor, start, members, moved}
//            | {mode:'rotate', center, startAngle, members, moved}
//            | {mode:'marquee', start, cur, additive}
// members: [{p, pts}] — the unlocked selection with pre-drag point copies
let drag = null;

// undo/redo: snapshots of the whole document, capped at 100 actions
const HISTORY_MAX = 101;           // initial "New sheet" entry + 100 actions
let history = [];                  // [{ label, state }]
let historyIndex = -1;

// clipboard for copy/paste (deep copies, offset a little on each paste)
let clipboard = null;
let pasteCount = 0;

// view + document settings
let gridSize = 28;                 // background grid pitch, px (view-only)
let snapOn = false;                // snap moves/transforms to the grid
let canvasW = 1200;                // canvas size
let canvasH = 800;
const lockedIds = new Set();       // which pieces are locked (not in history)

// image pieces: the (potentially large) data URLs live OUTSIDE history
// snapshots, keyed by piece id, so undo/redo stays lightweight
const imgSrcs = new Map();         // piece id -> data URL
const imgCache = new Map();        // piece id -> loaded Image element

function cacheImage(p) {
  if (typeof Image === "undefined" || !p.src) return;
  const im = new Image();
  im.onload = () => render();
  im.src = p.src;
  imgCache.set(p.id, im);
}

// layers: ordered bottom -> top. Pieces carry a layer id.
// Visibility is a view setting (like locks); structure/membership is history.
let layers = [{ id: 1, name: "Base" }];
let nextLayerId = 2;
let activeLayerId = 1;             // new pieces land here
const hiddenLayerIds = new Set();  // view-only
const layerOpacity = new Map();    // layer id -> 0.05..1 (view-only, saved)

// paint layer (raster, separate from the pattern — not in history)
let paintColor = "#7eb4dc";
let paintVisible = true;
let fillsOn = true;                // show the automatic pastel shape tints

function snap1(v) { return Math.round(v / gridSize) * gridSize; }
function snapPt(x, y) { return snapOn ? [snap1(x), snap1(y)] : [x, y]; }

function layerIndex(id) { return layers.findIndex(L => L.id === id); }
function isGuidePiece(p) { return !!p.guide || p.kind === "guide"; }
function onActiveLayer(p) { return p.layer === activeLayerId; }

/* Only the active layer is interactive — switching layers drops any
   selection that lives elsewhere. */
function setActiveLayer(id) {
  activeLayerId = id;
  selection = selection.filter(onActiveLayer);
}
function layerVisible(p) { return !hiddenLayerIds.has(p.layer); }

/* Pieces in stacking order: layer by layer (bottom first), preserving
   insertion order within each layer. */
function stackedPieces() {
  const order = new Map(layers.map((L, i) => [L.id, i]));
  return pieces
    .map((p, i) => [p, i])
    .sort((a, b) =>
      ((order.get(a[0].layer) ?? 0) - (order.get(b[0].layer) ?? 0)) ||
      (a[1] - b[1]))
    .map(([p]) => p);
}

/* Flatten a translucent glass color against the paper so pieces on upper
   layers are fully opaque and hide whatever sits beneath them. */
const PAPER_RGB = [246, 241, 230];
function opaqueFill(fill) {
  const m = /rgba\((\d+),\s*(\d+),\s*(\d+),\s*([\d.]+)\)/.exec(fill || "");
  if (!m) return fill;
  const a = parseFloat(m[4]);
  const mix = (c, p) => Math.round(c * a + p * (1 - a));
  return `rgb(${mix(+m[1], PAPER_RGB[0])}, ${mix(+m[2], PAPER_RGB[1])}, ${mix(+m[3], PAPER_RGB[2])})`;
}

/* Fill color for a piece under the current display settings. Shared by the
   on-screen renderer and the PNG exporter. */
function pieceFill(p) {
  if (p.kind !== "polygon" && p.kind !== "ellipse") return "none";
  if (isGuidePiece(p)) return "transparent";   // guides: clickable, colorless
  const upper = layerIndex(p.layer) > 0;
  if (upper) {
    // upper layers are always opaque — blank "paper" glass when tints are off
    return fillsOn ? opaqueFill(p.fill)
                   : `rgb(${PAPER_RGB[0]}, ${PAPER_RGB[1]}, ${PAPER_RGB[2]})`;
  }
  return fillsOn ? p.fill : "transparent";
}

const stage = document.getElementById("stage");
const board = document.getElementById("board");
const paintCanvas = document.getElementById("paint");
const pctx = paintCanvas.getContext ? paintCanvas.getContext("2d") : null;
const statusEl = document.getElementById("status");
const historyList = document.getElementById("history-list");
const layersList = document.getElementById("layers-list");

/* ============================ tool icons =============================== */
/* Tiny stained-glass swatches: each icon is a miniature of what the tool
   makes, drawn with the same lead-line + glass-fill treatment as the app. */

function icon(inner) {
  return `<svg width="26" height="26" viewBox="0 0 26 26">${inner}</svg>`;
}
const IC = {
  select:   icon(`<path d="M8 4 L8 19 L12 15.4 L14.6 21 L17 19.9 L14.4 14.4 L19.4 14 Z"
                   fill="rgba(230,205,110,.55)" stroke="${LEAD}" stroke-width="1.6" stroke-linejoin="round"/>`),
  ellipse:  icon(`<ellipse cx="13" cy="13" rx="9.5" ry="7" fill="rgba(126,180,220,.55)"
                   stroke="${LEAD}" stroke-width="1.8"/>`),
  triangle: icon(`<path d="M13 4.5 L22 21 L4 21 Z" fill="rgba(228,178,96,.55)"
                   stroke="${LEAD}" stroke-width="1.8" stroke-linejoin="round"/>`),
  rect:     icon(`<rect x="4" y="7" width="18" height="12" fill="rgba(148,190,120,.55)"
                   stroke="${LEAD}" stroke-width="1.8"/>`),
  pentagon: icon(`<path d="M13 3.5 L22.2 10.4 L18.7 21.4 L7.3 21.4 L3.8 10.4 Z"
                   fill="rgba(190,140,185,.55)" stroke="${LEAD}" stroke-width="1.8" stroke-linejoin="round"/>`),
  hexagon:  icon(`<path d="M13 3.2 L21.6 8.1 L21.6 17.9 L13 22.8 L4.4 17.9 L4.4 8.1 Z"
                   fill="rgba(220,130,115,.55)" stroke="${LEAD}" stroke-width="1.8" stroke-linejoin="round"/>`),
  line:     icon(`<line x1="5" y1="21" x2="21" y2="5" stroke="${LEAD}"
                   stroke-width="2.4" stroke-linecap="round"/>`),
  guide:    icon(`<line x1="5" y1="21" x2="21" y2="5" stroke="${GUIDE}"
                   stroke-width="1.6" stroke-linecap="round" stroke-dasharray="4 3.5"/>`),
  gcurve:   icon(`<path d="M4 20 Q13 2 22 20" fill="none" stroke="${GUIDE}"
                   stroke-width="1.6" stroke-linecap="round" stroke-dasharray="4 3.5"/>`),
  curve:    icon(`<path d="M4 20 Q13 2 22 20" fill="none" stroke="${LEAD}"
                   stroke-width="2.4" stroke-linecap="round"/>`),
  bucket:   icon(`<path d="M12.5 4.5 L20 12 L12 20 L4.5 12.5 Z" fill="rgba(126,180,220,.55)"
                   stroke="${LEAD}" stroke-width="1.8" stroke-linejoin="round"/>
                  <path d="M20.5 15.5 q2.3 3.2 0 4.6 q-2.3 -1.4 0 -4.6" fill="rgba(126,180,220,.8)"
                   stroke="${LEAD}" stroke-width="1.3"/>`),
  slice:    icon(`<path d="M8.8 16.4 L20 4.5 M17.2 16.4 L6 4.5" stroke="${LEAD}"
                   stroke-width="1.9" stroke-linecap="round"/>
                  <circle cx="7" cy="19" r="2.7" fill="none" stroke="${LEAD}" stroke-width="1.8"/>
                  <circle cx="19" cy="19" r="2.7" fill="none" stroke="${LEAD}" stroke-width="1.8"/>`),
};

const SHAPE_TOOL_LIST = [
  ["ellipse",  "Ellipse"],
  ["triangle", "Triangle"],
  ["rect",     "Rectangle"],
  ["pentagon", "Pentagon"],
  ["hexagon",  "Hexagon"],
];

function setTool(key) {
  tool = key;
  stage.style.cursor = key === "bucket" ? "crosshair" : "";

    b.classList.toggle("active", b.dataset.tool === key));
